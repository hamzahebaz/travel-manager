<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tour Detail | TourVoyage Morocco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
</head>
<body>

<nav class="navbar" id="mainNavbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><img src="images/logo.png" alt="TourVoyage Logo" style="height: 38px;"></a>
      <div class="navbar-nav nav-menu-dynamic"></div>
      <div class="navbar-actions">
        <a href="contact.html" class="btn btn-primary btn-sm">Book Now</a>
        <button class="navbar-toggle" id="navToggle"><i class="fa-solid fa-bars"></i></button>
      </div>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <div class="nav-menu-dynamic"></div>
</div>

<!-- Tour Hero -->
<div class="detail-hero" style="margin-top:0">
  <img id="detailHeroImg" src="" alt="Tour" class="detail-hero-img" />
  <div class="detail-hero::after"></div>
  <div class="detail-hero-content">
    <div class="container">
      <div class="page-hero-breadcrumb" style="margin-bottom:12px">
        <a href="index.html">Home</a><i class="fa-solid fa-chevron-right"></i>
        <a href="tours.html">Tours</a><i class="fa-solid fa-chevron-right"></i>
        <span id="detailTitle">Tour</span>
      </div>
      <h1 style="font-family:'Playfair Display',serif;font-size:2rem;font-weight:800;color:white;margin-bottom:12px" id="detailTitleH1">Loading...</h1>
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center">
        <span style="color:rgba(255,255,255,0.8);font-size:0.88rem"><i class="fa-solid fa-location-dot" style="color:var(--teal)"></i> <span id="detailDest"></span></span>
        <span style="color:rgba(255,255,255,0.8);font-size:0.88rem"><i class="fa-solid fa-clock" style="color:var(--teal)"></i> <span id="detailDuration"></span></span>
        <span style="font-size:0.88rem" id="detailRating"></span>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="detail-layout">
    <div>
      <div id="detailContent"><!-- Populated by JS --></div>
      <div id="tourGallerySection" class="gallery-section" style="display:none; margin-top:30px">
        <h3><i class="fa-solid fa-images" style="color:var(--teal)"></i> Tour Gallery</h3>
        <div id="tourGalleryGrid" class="gallery-grid"></div>
      </div>
      
      <!-- Tour Reviews Section -->
      <div id="tourReviewsSection" class="reviews-section" style="margin-top:40px; border-top:1px solid var(--border); padding-top:30px">
        <h3 style="font-family:'Playfair Display',serif;font-size:1.35rem;font-weight:700;color:var(--coffee-dark);margin-bottom:20px;display:flex;align-items:center;gap:8px">
          <i class="fa-solid fa-star" style="color:var(--teal)"></i> Customer Reviews (<span id="reviewsCount">0</span>)
        </h3>
        
        <!-- Reviews List -->
        <div id="reviewsList" style="display:flex; flex-direction:column; gap:20px; margin-bottom:30px">
          <!-- Populated by JS -->
        </div>

        <!-- Leave a Review Form -->
        <div class="review-form-container" style="background:var(--cream); padding:24px; border-radius:var(--radius-sm); border:1px solid var(--border2)">
          <h4 style="font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--coffee-dark);margin-bottom:16px">Leave a Review</h4>
          <form id="reviewForm" onsubmit="submitReview(event)">
            <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:16px">
              <div>
                <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--coffee-med); margin-bottom:6px">Your Name *</label>
                <input type="text" id="rAuthor" required placeholder="John Doe" class="form-input" style="background:white" />
              </div>
              <div>
                <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--coffee-med); margin-bottom:6px">Your Email *</label>
                <input type="email" id="rEmail" required placeholder="john@example.com" class="form-input" style="background:white" />
              </div>
            </div>
            
            <div style="margin-bottom:16px">
              <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--coffee-med); margin-bottom:6px">Rating *</label>
              <div class="rating-stars-input" style="display:flex; gap:6px; font-size:1.3rem; color:var(--sand-dark); cursor:pointer">
                <i class="fa-star fa-solid star-input" data-rating="1"></i>
                <i class="fa-star fa-solid star-input" data-rating="2"></i>
                <i class="fa-star fa-solid star-input" data-rating="3"></i>
                <i class="fa-star fa-solid star-input" data-rating="4"></i>
                <i class="fa-star fa-solid star-input" data-rating="5"></i>
              </div>
              <input type="hidden" id="rRating" value="5" />
            </div>

            <div style="margin-bottom:16px">
              <label style="display:block; font-size:0.8rem; font-weight:600; color:var(--coffee-med); margin-bottom:6px">Your Review *</label>
              <textarea id="rText" required rows="4" placeholder="Share your experience on this tour..." class="form-textarea" style="background:white"></textarea>
            </div>
            
            <button type="submit" class="btn btn-primary"><i class="fa-solid fa-paper-plane"></i> Submit Review</button>
          </form>
        </div>
      </div>
    </div>
    <div><div class="booking-card" id="bookingCard"><!-- Populated by JS --></div></div>
  </div>

  <!-- Related Tours -->
  <div style="padding-bottom:64px">
    <h3 style="font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;margin-bottom:24px">You Might Also Like</h3>
    <div class="tours-grid" id="relatedToursGrid"></div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="footer-brand-name"><img src="images/logo.png" alt="TourVoyage Logo" style="height: 34px;"></div>
        <p class="footer-desc footer-desc-text">Your trusted partner for authentic Morocco travel experiences.</p>
        <div class="footer-socials footer-socials-dynamic"></div>
      </div>
      <div><h5 class="footer-col-title">Quick Links</h5><div class="footer-links"><a href="tours.html" class="footer-link">All Tours</a><a href="destinations.html" class="footer-link">Destinations</a><a href="hotels.html" class="footer-link">Hotels</a><a href="about.html" class="footer-link">About</a><a href="contact.html" class="footer-link">Contact</a></div></div>
      <div><h5 class="footer-col-title">Tour Types</h5><div class="footer-links"><a href="tours.html?cat=circuit" class="footer-link">Circuits</a><a href="tours.html?cat=excursion" class="footer-link">Excursions</a><a href="tours.html?cat=city-tour" class="footer-link">City Tours</a></div></div>
      <div><h5 class="footer-col-title">Contact</h5><div class="footer-contact-item"><i class="fa-solid fa-phone"></i><span class="footer-phone"></span></div><div class="footer-contact-item"><i class="fa-solid fa-envelope"></i><span class="footer-email"></span></div></div>
    </div>
  </div>
  <div class="container"><div class="footer-bottom"><span class="footer-copy">© <span id="footerYear"></span> TourVoyage.</span></div></div>
</footer>
<button class="back-to-top"><i class="fa-solid fa-arrow-up"></i></button>
<div id="siteToastContainer" class="toast-container"></div>
<script src="../shared/data.js"></script>
<script src="js/main.js"></script>
<script>
document.getElementById('footerYear').textContent = new Date().getFullYear();
const id = new URLSearchParams(window.location.search).get('id');
if(id) {
  const t = window.TM ? TM.getItem('tours', id) : null;
  if(t) {
    document.getElementById('detailTitleH1').textContent = t.title;
    document.getElementById('detailHeroImg').src = t.image;
  }
}
</script>
</body>
</html>
