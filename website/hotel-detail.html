<!DOCTYPE html>
<html lang="en">
<head>
  <script>
    if (window.location.protocol !== 'file:') {
      const base = document.createElement('base');
      base.href = '/website/';
      document.head.insertBefore(base, document.head.firstChild);
    }
  </script>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hotel Detail | TourVoyage Morocco</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="images/favicon.png" />
</head>
<body>

<nav class="navbar" id="mainNavbar">
  <div class="container">
    <div class="navbar-inner">
      <a href="index.html" class="navbar-brand"><img src="images/logo.png" alt="TourVoyage Logo" style="height: 38px;"></a>
      <div class="navbar-nav nav-menu-dynamic"></div>
      <div class="navbar-actions">
        <a href="contact.html" class="btn btn-primary btn-sm">Book Now</a>
        <button class="navbar-toggle" id="navToggle"><i class="fa-solid fa-bars"></i></button>
      </div>
    </div>
  </div>
</nav>
<div class="mobile-menu" id="mobileMenu">
  <div class="nav-menu-dynamic"></div>
</div>

<!-- Hotel Hero -->
<div class="detail-hero" style="margin-top:0">
  <img id="detailHeroImg" src="" alt="Hotel" class="detail-hero-img" />
  <div class="detail-hero::after"></div>
  <div class="detail-hero-content">
    <div class="container">
      <div class="page-hero-breadcrumb" style="margin-bottom:12px">
        <a href="index.html">Home</a><i class="fa-solid fa-chevron-right"></i>
        <a href="hotels.html">Hotels</a><i class="fa-solid fa-chevron-right"></i>
        <span id="detailTitle">Hotel</span>
      </div>
      <h1 style="font-family:var(--font-headings);font-size:2rem;font-weight:800;color:white;margin-bottom:12px;" id="detailTitleH1">Loading...</h1>
      <div style="display:flex;gap:20px;flex-wrap:wrap;align-items:center">
        <span style="color:rgba(255,255,255,0.8);font-size:0.88rem"><i class="fa-solid fa-location-dot" style="color:var(--teal)"></i> <span id="detailDest"></span></span>
        <span style="font-size:0.88rem;color:var(--gold);" id="detailRating"></span>
      </div>
    </div>
  </div>
</div>

<div class="container">
  <div class="detail-layout">
    <div>
      <div id="detailContent" style="font-size:1rem; line-height:1.7; color:var(--coffee-med); margin-bottom:30px;">
        <!-- Populated by JS -->
      </div>
      
      <!-- Amenities Section -->
      <div id="hotelAmenitiesSection" style="margin-bottom:30px;">
        <h3 style="font-family:var(--font-headings);font-size:1.35rem;font-weight:700;color:var(--coffee-dark);margin-bottom:12px;">Hotel Amenities</h3>
        <div id="hotelAmenitiesTags" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
      </div>

      <!-- Rooms Listing Section -->
      <div id="hotelRoomsSection" style="margin-top:30px; border-top:1px solid var(--border); padding-top:30px; margin-bottom:40px;">
        <h3 style="font-family:var(--font-headings);font-size:1.35rem;font-weight:700;color:var(--coffee-dark);margin-bottom:16px;">
          <i class="fa-solid fa-bed" style="color:var(--teal)"></i> Available Rooms & Suites
        </h3>
        <div id="hotelRoomsGrid" style="display:flex; flex-direction:column; gap:20px;">
          <!-- Populated by JS -->
        </div>
      </div>

      <!-- Gallery Section -->
      <div id="hotelGallerySection" class="gallery-section" style="display:none; margin-top:30px">
        <h3><i class="fa-solid fa-images" style="color:var(--teal)"></i> Hotel Gallery</h3>
        <div id="hotelGalleryGrid" class="gallery-grid"></div>
      </div>
    </div>
    
    <!-- Right Booking Sidebar Card -->
    <div>
      <div class="booking-card" id="bookingCard">
        <!-- Populated by JS -->
      </div>
    </div>
  </div>
</div>

<footer>
  <div class="container">
    <div class="footer-grid">
      <div class="footer-brand">
        <div class="footer-brand-name"><img src="images/logo.png" alt="TourVoyage Logo" style="height: 34px;"></div>
        <p class="footer-desc footer-desc-text">Your trusted partner for authentic Morocco travel experiences.</p>
        <div class="footer-socials footer-socials-dynamic"></div>
      </div>
      <div><h5 class="footer-col-title">Quick Links</h5><div class="footer-links"><a href="tours.html" class="footer-link">All Tours</a><a href="destinations.html" class="footer-link">Destinations</a><a href="hotels.html" class="footer-link">Hotels</a><a href="about.html" class="footer-link">About</a><a href="contact.html" class="footer-link">Contact</a></div></div>
      <div><h5 class="footer-col-title">Tour Types</h5><div class="footer-links"><a href="tours.html?cat=circuit" class="footer-link">Circuits</a><a href="tours.html?cat=excursion" class="footer-link">Excursions</a><a href="tours.html?cat=city-tour" class="footer-link">City Tours</a></div></div>
      <div><h5 class="footer-col-title">Contact</h5><div class="footer-contact-item"><i class="fa-solid fa-phone"></i><span class="footer-phone"></span></div><div class="footer-contact-item"><i class="fa-solid fa-envelope"></i><span class="footer-email"></span></div></div>
    </div>
  </div>
  <div class="container"><div class="footer-bottom"><span class="footer-copy">© <span id="footerYear"></span> TourVoyage.</span></div></div>
</footer>
<button class="back-to-top"><i class="fa-solid fa-arrow-up"></i></button>
<div id="siteToastContainer" class="toast-container"></div>
<script src="../shared/data.js"></script>
<script src="js/main.js"></script>
<script>
document.getElementById('footerYear').textContent = new Date().getFullYear();
const id = new URLSearchParams(window.location.search).get('id');
if(id) {
  const h = window.TM ? TM.getItem('hotels', id) : null;
  if(h) {
    document.getElementById('detailTitleH1').textContent = h.name;
    document.getElementById('detailHeroImg').src = h.image;
  }
}
</script>
</body>
</html>
